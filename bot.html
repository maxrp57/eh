<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarbes RP — Dashboard Fondateur</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1c1e;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #24272b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { text-align: center; color: #00fa9a; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input, select, textarea {
            width: 100%; padding: 10px; border-radius: 6px;
            border: 1px solid #444; background: #1a1c1e; color: #fff;
            box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px; background: #00fa9a;
            border: none; color: #1a1c1e; font-weight: bold;
            font-size: 16px; border-radius: 6px; cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #00c875; }
        .status-msg { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tarbes RP — Panneau de Contrôle</h1>
    <hr style="border-color: #444;">
    
    <div class="form-group">
        <label for="salonId">ID du Salon Discord cible</label>
        <input type="text" id="salonId" placeholder="Ex: 112233445566778899">
    </div>

    <div class="form-group">
        <label for="actionType">Type de Commande</label>
        <select id="actionType">
            <option value="session">Annoncer une Session</option>
            <option value="status">Changer le Statut du Serveur</option>
        </select>
    </div>

    <div class="form-group">
        <label for="contenuMsg">Texte de l'annonce</label>
        <textarea id="contenuMsg" rows="4" placeholder="Écris ton texte ici..."></textarea>
    </div>

    <button onclick="envoyerCommande()">Envoyer sur Discord 🚀</button>
    
    <div id="status" class="status-msg"></div>
</div>

<script>
    async def envoyerCommande():
        const salonId = document.getElementById('salonId').value;
        const action = document.getElementById('actionType').value;
        const contenu = document.getElementById('contenuMsg').value;
        const statusDiv = document.getElementById('status');

        if(!salonId || !contenu) {
            statusDiv.style.color = "red";
            statusDiv.innerText = "❌ Remplis tous les champs !";
            return;
        }

        statusDiv.style.color = "orange";
        statusDiv.innerText = "Envoi en cours...";

        // Remplacer localhost par ton IP si le bot tourne sur ton Mac à distance
        const BOT_URL = "http://localhost:5000/api/commande"; 

        try {
            const response = await fetch(BOT_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    cle: "TARBES_SUPER_SECRET_123", // Doit matcher la clé du fichier Python
                    action: action,
                    salon_id: salonId,
                    contenu: contenu
                })
            });

            const data = await response.json();
            if(response.ok) {
                statusDiv.style.color = "#00fa9a";
                statusDiv.innerText = "✅ Commandé envoyée avec succès sur Discord !";
            } else {
                statusDiv.style.color = "red";
                statusDiv.innerText = "❌ Erreur : " + data.erreur;
            }
        } catch (error) {
            statusDiv.style.color = "red";
            statusDiv.innerText = "❌ Impossible de joindre le Bot (Vérifie qu'il est allumé).";
        }
    }
</script>

</body>
</html>
